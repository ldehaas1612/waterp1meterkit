# WaterP1MeterKit V3 Ethernet Configuration

substitutions:
  default_network: "Ethernet"

packages:
  base: !include base.yaml

dashboard_import:
  package_import_url: github://ldehaas1612/waterp1meterkit/blob/5021cad58fde8d4b64268f805122861f33bbdb2d/waterp1meterkit-v3/waterp1meterkit-ethernet.yaml

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    mode: CLK_OUT
    pin: GPIO17
  phy_addr: 1
  power_pin: GPIO33

text_sensor:
  - platform: ethernet_info
    ip_address:
      id: ethernet_ip_address
      name: "${friendly_name} IP Address"
      icon: "mdi:network-outline"
